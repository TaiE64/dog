# Joint state controller
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 200

# Go2 leg joints (PD at 250Hz, matching MuJoCo kp=25, kd=0.5)
FL_hip_controller:
  type: effort_controllers/JointPositionController
  joint: FL_hip_joint
  pid: {p: 25.0, i: 0.0, d: 0.5}

FL_thigh_controller:
  type: effort_controllers/JointPositionController
  joint: FL_thigh_joint
  pid: {p: 25.0, i: 0.0, d: 0.5}

FL_calf_controller:
