# Joint state controller
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 200

# Effort controller for all Go2 leg joints
go2_effort_controller:
  type: effort_controllers/JointGroupEffortController
  joints:
    - FL_hip_joint
    - FL_thigh_joint
    - FL_calf_joint
    - FR_hip_joint
    - FR_thigh_joint
    - FR_calf_joint
    - RL_hip_joint
    - RL_thigh_joint
    - RL_calf_joint
    - RR_hip_joint
    - RR_thigh_joint
    - RR_calf_joint

# DIY joints (PD at physics rate 250Hz, matching MuJoCo)
FL_diy_joint1_controller:
  type: effort_controllers/JointPositionController
  joint: FL_diy_joint1
  pid: {p: 100.0, i: 0.0, d: 5.0}

FL_diy_joint2_controller:
  type: effort_controllers/JointPositionController
  joint: FL_diy_joint2
  pid: {p: 10.0, i: 0.0, d: 0.5}

FL_diy_joint3_controller:
  type: effort_controllers/JointPositionController
  joint: FL_diy_joint3
  pid: {p: 10.0, i: 0.0, d: 0.5}

FL_diy_joint4_controller:
  type: effort_controllers/JointPositionController
  joint: FL_diy_joint4
  pid: {p: 10.0, i: 0.0, d: 0.5}

diy_joint1_controller:
  type: effort_controllers/JointPositionController
  joint: diy_joint1
  pid: {p: 100.0, i: 0.0, d: 5.0}

diy_joint2_controller:
  type: effort_controllers/JointPositionController
  joint: diy_joint2
  pid: {p: 10.0, i: 0.0, d: 0.5}

diy_joint3_controller:
  type: effort_controllers/JointPositionController
  joint: diy_joint3
  pid: {p: 10.0, i: 0.0, d: 0.5}

diy_joint4_controller:
  type: effort_controllers/JointPositionController
  joint: diy_joint4
  pid: {p: 10.0, i: 0.0, d: 0.5}
