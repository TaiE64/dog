# Joint state controller
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 200

# Go2 leg joints (JointPositionController, PD at 250Hz physics rate)
# walk_controller sends target angles at 50Hz, ros_control computes PD torque every physics step
FL_hip_controller:
  type: effort_controllers/JointPositionController
  joint: FL_hip_joint
  pid: {p: 25.0, i: 0.0, d: 0.5}

FL_thigh_controller:
  type: effort_controllers/JointPositionController
  joint: FL_thigh_joint
  pid: {p: 25.0, i: 0.0, d: 0.5}

